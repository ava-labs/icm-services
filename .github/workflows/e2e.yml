name: E2E Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # JOB to run change detection
  changes:
    runs-on: ubuntu-22.04
    # Set job outputs to values from filter step
    outputs:
      contracts: ${{ steps.filter.outputs.contracts }}
      services: ${{ steps.filter.outputs.services }}
    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Detect changed components
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            contracts:
              - '.github/workflows/e2e.yml'
              - 'go.mod'
              - 'icm-contracts/contracts/**'
              - 'icm-contracts/tests/**'
              - 'icm-contracts/utils/**'
              - 'scripts/**'
            services:
              - '.github/workflows/e2e.yml'
              - 'go.mod'
              - 'icm-contracts/tests/**'
              - 'icm-contracts/utils/**'
              - 'config/**'
              - 'database/**'
              - 'messages/**'
              - 'peers/**'
              - 'relayer/**'
              - 'signature-aggregator/**'
              - 'scripts/**'
              - 'types/**'
              - 'utils/**'
              - 'vms/**'

  teleporter_e2e:
    name: teleporter-e2e-tests
    needs: changes
    if: ${{ needs.changes.outputs.contracts == 'true' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Install Foundry
        run: ./scripts/install_foundry.sh

      - name: Cache reforge binary
        id: cache-reforge
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/reforge
          key: ${{ runner.os }}-reforge-${{ hashFiles('icm-macros/Cargo.lock') }}

      - name: Cache Cargo (icm-macros)
        if: steps.cache-reforge.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            icm-macros/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('icm-macros/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Configure git credentials for private dependencies
        if: steps.cache-reforge.outputs.cache-hit != 'true'
        run: |
          git config --global url."https://${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
          mkdir -p ~/.cargo && echo -e '[net]\ngit-fetch-with-cli = true' >> ~/.cargo/config.toml

      - name: Build reforge
        if: steps.cache-reforge.outputs.cache-hit != 'true'
        run: ./scripts/build_reforge.sh

      - name: Run E2E Tests
        # Forge installs to BASE_DIR, but updates the PATH definition in $HOME/.bashrc
        run: |
          export PATH=$PATH:$HOME/.foundry/bin:$HOME/.local/bin
          export PATH="$PATH:$GOPATH/bin"
          ./scripts/e2e_test.sh --components teleporter

