name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  solidity-unit-tests:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Foundry
        run: ./scripts/install_foundry.sh

      - name: Cache reforge binary
        id: cache-reforge
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/reforge
          key: ${{ runner.os }}-reforge-${{ hashFiles('icm-macros/Cargo.lock') }}

      - name: Cache Cargo (icm-macros)
        if: steps.cache-reforge.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            icm-macros/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('icm-macros/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build reforge
        if: steps.cache-reforge.outputs.cache-hit != 'true'
        run: ./scripts/build_reforge.sh

      - name: Run Avalanche unit tests
        run: |
          export PATH=$PATH:$HOME/.foundry/bin:$HOME/.local/bin
          forge test -vvv

      - name: Run Ethereum unit tests
        run: |
          export PATH=$PATH:$HOME/.foundry/bin:$HOME/.local/bin
          FOUNDRY_PROFILE=ethereum forge test -vvv

      - name: Run Common unit tests
        run: |
          export PATH=$PATH:$HOME/.foundry/bin:$HOME/.local/bin
          FOUNDRY_PROFILE=common forge test -vvv

  unit_tests:
    name: Unit tests
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Run Golang Unit Tests
        run: ./scripts/test.sh
