name: slither Analyze

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"

jobs:
  slither-analyze:
    name: Slither Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.8

      - name: Install Slither
        run: |
          pip install slither-analyzer

      - name: Install Foundry
        run: ./scripts/install_foundry.sh

      - name: Apply expanded macros
        run: |
          # Copy pre-generated expanded contracts over the macro-annotated originals
          # so that forge compiles the expanded Solidity that slither will analyze.
          find icm-contracts-expanded -name '*.sol' | while IFS= read -r f; do
              rel="${f#icm-contracts-expanded/}"
              dest="icm-contracts/$rel"
              cp "$f" "$dest"
          done

      - name: Compile with expanded sources
        run: |
          export PATH=$PATH:$HOME/.foundry/bin
          forge build --build-info
          FOUNDRY_PROFILE=common forge build --build-info
          FOUNDRY_PROFILE=ethereum forge build --build-info

      - name: Run Slither
        run: |
          export PATH=$PATH:$HOME/.foundry/bin:$HOME/.local/bin
          slither ./ --foundry-ignore-compile --fail-none --sarif ./results.sarif

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
