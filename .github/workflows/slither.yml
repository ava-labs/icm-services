name: slither Analyze

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"

jobs:
  slither-analyze:
    name: Slither Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.8

      - name: Install Slither
        run: |
          pip install slither-analyzer

      - name: Install Foundry
        run: ./scripts/install_foundry.sh

      - name: Cache reforge binary
        id: cache-reforge
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/reforge
          key: ${{ runner.os }}-reforge-${{ hashFiles('icm-macros/Cargo.lock') }}

      - name: Cache Cargo (icm-macros)
        if: steps.cache-reforge.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            icm-macros/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('icm-macros/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build reforge
        if: steps.cache-reforge.outputs.cache-hit != 'true'
        run: ./scripts/build_reforge.sh

      - name: Run Slither
        run: |
          export PATH=$PATH:$HOME/.foundry/bin:$HOME/.local/bin
          slither ./ --fail-none --sarif ./results.sarif

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
