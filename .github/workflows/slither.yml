name: slither Analyze

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"

jobs:
  slither-analyze:
    name: Slither Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.8

      - name: Install Slither
        run: |
          pip install slither-analyzer

      - name: Install Foundry
        run: ./scripts/install_foundry.sh

      - name: Setup reforge
        uses: ./.github/actions/setup-reforge

      - name: Expand macros and compile
        run: |
          export PATH=$PATH:$HOME/.foundry/bin:$HOME/.local/bin
          reforge build --build-info
          FOUNDRY_PROFILE=common reforge build --build-info
          FOUNDRY_PROFILE=ethereum reforge build --build-info

      - name: Sync expanded sources from build artifacts
        run: |
          python3 - <<'EOF'
          import json, glob, os
          for f in glob.glob("out/build-info/*.json"):
              d = json.load(open(f))
              for path, info in d.get("input", {}).get("sources", {}).items():
                  content = info.get("content", "")
                  if content and os.path.exists(path):
                      if open(path).read() != content:
                          open(path, "w").write(content)
                          print(f"Updated: {path}")
          EOF

      - name: Run Slither
        run: |
          export PATH=$PATH:$HOME/.foundry/bin:$HOME/.local/bin
          slither ./ --foundry-ignore-compile --fail-none --sarif ./results.sarif

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
